# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate tag matches package.json version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          [ "$TAG_VERSION" = "$PACKAGE_VERSION" ]
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Prepare versioned release assets
        shell: bash
        run: |
          cp dist/chrome.zip "dist/bullshield-chromium-v${PACKAGE_VERSION}.zip"
          cp dist/firefox.zip "dist/bullshield-firefox-v${PACKAGE_VERSION}.zip"
          sha256sum \
            "dist/bullshield-chromium-v${PACKAGE_VERSION}.zip" \
            "dist/bullshield-firefox-v${PACKAGE_VERSION}.zip" \
            > dist/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bullshield-chromium-v${{ env.PACKAGE_VERSION }}.zip
            dist/bullshield-firefox-v${{ env.PACKAGE_VERSION }}.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            Release assets for Bullshield.

            - bullshield-chromium-v${{ env.PACKAGE_VERSION }}.zip - Chromium package for manual installation
            - bullshield-firefox-v${{ env.PACKAGE_VERSION }}.zip - Firefox build artifact
            - SHA256SUMS.txt - checksums for downloaded assets
